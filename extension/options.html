<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Cooperatify — Settings</title>
<style>
  :root { color-scheme: dark; }
  body { width: 380px; margin: 0; padding: 20px; font: 14px/1.5 Inter, system-ui, sans-serif; background: #0b0b10; color: #f5f6fa; }
  h1 { margin: 0 0 14px; font-size: 16px; }
  label { display: block; font-size: 12px; color: #b5b8c8; margin: 12px 0 4px; }
  input, select { width: 100%; background: #0f1019; color: #f5f6fa; border: 1px solid #2a2d3f; border-radius: 8px; padding: 9px; box-sizing: border-box; font: inherit; }
  button { margin-top: 16px; padding: 9px 16px; border: 0; border-radius: 9px; background: linear-gradient(135deg, #a78bfa, #60a5fa); color: #0b0b10; font-weight: 600; cursor: pointer; }
  .ok { color: #34d399; font-size: 12px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>
  <h1>Cooperatify settings</h1>
  <label>API base URL</label>
  <input id="apiBase" placeholder="https://cooperatify.vercel.app" />
  <label>Default format</label>
  <select id="format">
    <option value="slack">Slack</option>
    <option value="email">Email</option>
    <option value="linkedin">LinkedIn</option>
  </select>
  <button id="save">Save</button>
  <div class="ok" id="ok"></div>
  <script src="options.js"></script>
</body>
</html>
